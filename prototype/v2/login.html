<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radar — Entrar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  <style>
    /* ── M3 Color Tokens (teal seed #006B5E) ── */
    :root {
      --md-primary: #006B5E;
      --md-on-primary: #FFFFFF;
      --md-primary-container: #9EF2E4;
      --md-on-primary-container: #00201C;
      --md-secondary: #4A635F;
      --md-on-secondary: #FFFFFF;
      --md-secondary-container: #CCE8E2;
      --md-tertiary: #456179;
      --md-tertiary-container: #CCE5FF;
      --md-error: #BA1A1A;
      --md-error-container: #FFDAD6;
      --md-on-error-container: #410002;
      --md-background: #FAFDFC;
      --md-on-background: #191C1C;
      --md-surface: #FAFDFC;
      --md-on-surface: #191C1C;
      --md-surface-variant: #DAE5E2;
      --md-on-surface-variant: #3F4948;
      --md-outline: #6F7979;
      --md-outline-variant: #BEC9C7;
      --md-surface-container-lowest: #FFFFFF;
      --md-surface-container-low: #F3F6F5;
      --md-surface-container: #EDF0EF;
      --md-surface-container-high: #E7EAEA;
      --md-inverse-primary: #82D5C7;

      /* M3 Elevation shadows */
      --md-elev-1: 0px 1px 2px rgba(0,0,0,.3), 0px 1px 3px 1px rgba(0,0,0,.15);
      --md-elev-2: 0px 1px 2px rgba(0,0,0,.3), 0px 2px 6px 2px rgba(0,0,0,.15);

      /* M3 Shape */
      --md-shape-xs: 4px;
      --md-shape-sm: 8px;
      --md-shape-md: 12px;
      --md-shape-lg: 16px;
      --md-shape-xl: 28px;
      --md-shape-full: 50px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Roboto', sans-serif;
      background: var(--md-surface-container-low);
      color: var(--md-on-surface);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      line-height: 1;
      vertical-align: middle;
    }

    /* ── Page layout ── */
    .auth-page {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      min-height: 100vh;
    }

    /* ── Brand ── */
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .brand-logo {
      width: 48px;
      height: 48px;
      border-radius: var(--md-shape-md);
      background: var(--md-primary);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .brand-logo .material-symbols-outlined {
      color: var(--md-on-primary);
      font-size: 28px;
    }
    .brand-name {
      font-family: 'Google Sans', 'Roboto', sans-serif;
      font-size: 28px;
      font-weight: 400;
      color: var(--md-on-surface);
      letter-spacing: -0.5px;
    }

    /* ── Card ── */
    .auth-card {
      background: var(--md-surface-container-lowest);
      border-radius: var(--md-shape-xl);
      padding: 40px 40px 32px;
      width: 100%;
      max-width: 440px;
      box-shadow: var(--md-elev-1);
    }

    .auth-card-header {
      margin-bottom: 32px;
    }
    .auth-card-title {
      font-family: 'Google Sans', 'Roboto', sans-serif;
      font-size: 24px;
      font-weight: 400;
      color: var(--md-on-surface);
      margin-bottom: 8px;
    }
    .auth-card-subtitle {
      font-size: 14px;
      color: var(--md-on-surface-variant);
      line-height: 1.5;
    }
    .auth-card-subtitle strong {
      color: var(--md-primary);
      font-weight: 500;
    }

    /* ── Outlined Text Field M3 ── */
    .text-field {
      position: relative;
      margin-bottom: 20px;
    }
    .text-field-input {
      width: 100%;
      height: 56px;
      padding: 16px 48px 16px 16px;
      border: 1px solid var(--md-outline);
      border-radius: var(--md-shape-xs);
      background: transparent;
      font-size: 16px;
      font-family: 'Roboto', sans-serif;
      color: var(--md-on-surface);
      outline: none;
      transition: border-color .2s, border-width .1s;
    }
    .text-field-input:hover { border-color: var(--md-on-surface); }
    .text-field-input:focus { border: 2px solid var(--md-primary); }
    .text-field-input.error { border-color: var(--md-error); }
    .text-field-input.error:focus { border-color: var(--md-error); }

    .text-field-label {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: var(--md-on-surface-variant);
      pointer-events: none;
      transition: all .2s cubic-bezier(.4,0,.2,1);
      background: var(--md-surface-container-lowest);
      padding: 0 4px;
    }
    .text-field-input:focus ~ .text-field-label,
    .text-field-input:not(:placeholder-shown) ~ .text-field-label {
      top: 0;
      font-size: 12px;
      color: var(--md-primary);
      font-weight: 500;
    }
    .text-field-input.error ~ .text-field-label,
    .text-field-input.error:focus ~ .text-field-label {
      color: var(--md-error);
    }

    .text-field-icon {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--md-on-surface-variant);
      cursor: pointer;
      padding: 4px;
      border-radius: var(--md-shape-full);
      transition: background .2s;
    }
    .text-field-icon:hover { background: rgba(0,0,0,.08); }

    .text-field-helper {
      font-size: 12px;
      color: var(--md-on-surface-variant);
      padding: 4px 16px 0;
    }
    .text-field-helper.error { color: var(--md-error); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: none;
      border-radius: var(--md-shape-full);
      font-family: 'Roboto', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: .1px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: box-shadow .2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: currentColor;
      opacity: 0;
      transition: opacity .2s;
    }
    .btn:hover::after { opacity: .08; }
    .btn:active::after { opacity: .12; }

    .btn-filled {
      background: var(--md-primary);
      color: var(--md-on-primary);
      padding: 10px 24px;
      height: 40px;
    }
    .btn-filled:hover { box-shadow: var(--md-elev-1); }

    .btn-outlined {
      background: transparent;
      color: var(--md-primary);
      border: 1px solid var(--md-outline);
      padding: 10px 24px;
      height: 40px;
    }

    .btn-text {
      background: transparent;
      color: var(--md-primary);
      padding: 10px 12px;
      height: 40px;
    }

    .btn-full { width: 100%; }
    .btn-lg { height: 48px; font-size: 16px; }

    /* ── Google Sign-in button ── */
    .btn-google {
      background: var(--md-surface-container-lowest);
      color: var(--md-on-surface);
      border: 1px solid var(--md-outline-variant);
      padding: 10px 24px;
      height: 40px;
      font-size: 14px;
    }
    .btn-google:hover { background: var(--md-surface-container-low); }
    .google-g {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* ── Divider ── */
    .divider-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
    }
    .divider-row hr {
      flex: 1;
      border: none;
      border-top: 1px solid var(--md-outline-variant);
    }
    .divider-row span {
      font-size: 12px;
      color: var(--md-on-surface-variant);
      white-space: nowrap;
    }

    /* ── Actions row ── */
    .auth-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    /* ── Footer ── */
    .auth-footer {
      margin-top: 24px;
      font-size: 12px;
      color: var(--md-on-surface-variant);
      text-align: center;
      line-height: 1.6;
    }
    .auth-footer a {
      color: var(--md-primary);
      text-decoration: none;
      font-weight: 500;
    }
    .auth-footer a:hover { text-decoration: underline; }

    /* ── Alert banner ── */
    .alert {
      display: none;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 16px;
      border-radius: var(--md-shape-md);
      background: var(--md-error-container);
      color: var(--md-on-error-container);
      font-size: 14px;
      margin-bottom: 20px;
    }
    .alert.visible { display: flex; }
    .alert .material-symbols-outlined { font-size: 20px; flex-shrink: 0; margin-top: 1px; }

    /* ── Loading state ── */
    .btn[aria-busy="true"] {
      pointer-events: none;
      opacity: .7;
    }
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    .btn[aria-busy="true"] .spinner { display: block; }
    .btn[aria-busy="true"] .btn-label { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .auth-card {
        padding: 32px 24px 24px;
        border-radius: var(--md-shape-lg);
      }
      .auth-card-title { font-size: 22px; }
    }
  </style>
</head>
<body>

<div class="auth-page">

  <!-- Brand -->
  <div class="brand">
    <div class="brand-logo">
      <span class="material-symbols-outlined">radar</span>
    </div>
    <span class="brand-name">Radar</span>
  </div>

  <!-- Card -->
  <div class="auth-card" role="main">
    <div class="auth-card-header">
      <h1 class="auth-card-title">Entrar</h1>
      <p class="auth-card-subtitle">para continuar em <strong>Radar</strong></p>
    </div>

    <!-- Error alert -->
    <div class="alert" id="alertBanner" role="alert">
      <span class="material-symbols-outlined">error</span>
      <span id="alertText">E-mail ou senha incorretos.</span>
    </div>

    <form id="loginForm" novalidate>
      <!-- Email -->
      <div class="text-field">
        <input
          class="text-field-input"
          type="email"
          id="email"
          name="email"
          autocomplete="email"
          placeholder=" "
          aria-label="E-mail"
          required
        >
        <label class="text-field-label" for="email">E-mail</label>
      </div>

      <!-- Password -->
      <div class="text-field">
        <input
          class="text-field-input"
          type="password"
          id="senha"
          name="senha"
          autocomplete="current-password"
          placeholder=" "
          aria-label="Senha"
          required
        >
        <label class="text-field-label" for="senha">Senha</label>
        <span class="text-field-icon material-symbols-outlined" id="toggleSenha" role="button" aria-label="Mostrar senha" tabindex="0">visibility</span>
      </div>

      <!-- Actions -->
      <div class="auth-actions">
        <button type="button" class="btn btn-text" onclick="window.location.href='cadastro.html'">
          Criar conta
        </button>
        <button type="submit" class="btn btn-filled btn-lg" id="btnEntrar" aria-busy="false">
          <div class="spinner" aria-hidden="true"></div>
          <span class="btn-label">Entrar</span>
        </button>
      </div>
    </form>

    <div class="divider-row">
      <hr><span>ou</span><hr>
    </div>

    <!-- Google Sign-in (visual only) -->
    <button type="button" class="btn btn-google btn-full">
      <svg class="google-g" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Entrar com Google
    </button>
  </div>

  <!-- Footer -->
  <div class="auth-footer">
    <p>
      <a href="#">Privacidade</a> &nbsp;·&nbsp;
      <a href="#">Termos</a> &nbsp;·&nbsp;
      <a href="#">Ajuda</a>
    </p>
  </div>

</div>

<script>
  // Toggle password visibility
  const toggleSenha = document.getElementById('toggleSenha');
  const senhaInput = document.getElementById('senha');
  toggleSenha.addEventListener('click', () => {
    const show = senhaInput.type === 'password';
    senhaInput.type = show ? 'text' : 'password';
    toggleSenha.textContent = show ? 'visibility_off' : 'visibility';
    toggleSenha.setAttribute('aria-label', show ? 'Ocultar senha' : 'Mostrar senha');
  });
  toggleSenha.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleSenha.click(); }
  });

  // Form submit
  const form = document.getElementById('loginForm');
  const btnEntrar = document.getElementById('btnEntrar');
  const alertBanner = document.getElementById('alertBanner');
  const alertText = document.getElementById('alertText');

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const senha = senhaInput.value;

    // Clear errors
    alertBanner.classList.remove('visible');
    document.querySelectorAll('.text-field-input').forEach(el => el.classList.remove('error'));

    // Basic validation
    if (!email) {
      document.getElementById('email').classList.add('error');
      return;
    }
    if (!senha) {
      senhaInput.classList.add('error');
      return;
    }

    // Simulate loading then redirect
    btnEntrar.setAttribute('aria-busy', 'true');
    setTimeout(() => {
      btnEntrar.setAttribute('aria-busy', 'false');
      // Demo: wrong password scenario for any non-demo credentials
      if (email === 'demo@radar.app' && senha === '123456') {
        window.location.href = 'painel.html';
      } else {
        alertText.textContent = 'E-mail ou senha incorretos. Use demo@radar.app / 123456 para a demo.';
        alertBanner.classList.add('visible');
        document.getElementById('email').classList.add('error');
        senhaInput.classList.add('error');
      }
    }, 1200);
  });

  // Clear error state on input
  document.querySelectorAll('.text-field-input').forEach(input => {
    input.addEventListener('input', () => {
      input.classList.remove('error');
      alertBanner.classList.remove('visible');
    });
  });
</script>
</body>
</html>
