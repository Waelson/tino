<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>LeadTrack Icon</title>
  <desc>Minimal SaaS icon with checklist, tracking nodes, and upward arrow in navy and Argentine flag blue.</desc>

  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0B1F3A" flood-opacity="0.14"/>
    </filter>
  </defs>

  <!-- App tile -->
  <rect x="32" y="32" width="448" height="448" rx="74" fill="#FFFFFF" filter="url(#softShadow)"/>
  <rect x="33.5" y="33.5" width="445" height="445" rx="72.5" stroke="#E8EEF6" stroke-width="3"/>

  <!-- Checklist document outline -->
  <path
    d="M171 353
       C151 353 135 337 135 317
       V157
       C135 137 151 121 171 121
       H287
       C307 121 323 137 323 157
       V228"
    stroke="#082F63"
    stroke-width="20"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Subtle left bottom document curve -->
  <path
    d="M135 316
       C135 342 155 361 181 361"
    stroke="#082F63"
    stroke-width="20"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Checklist ticks -->
  <path d="M172 174 L190 192 L222 157" stroke="#74ACDF" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M172 226 L190 244 L222 209" stroke="#74ACDF" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M172 278 L190 296 L222 261" stroke="#74ACDF" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Checklist text lines -->
  <path d="M247 175 H306" stroke="#082F63" stroke-width="16" stroke-linecap="round"/>
  <path d="M247 227 H306" stroke="#082F63" stroke-width="16" stroke-linecap="round"/>
  <path d="M247 279 H295" stroke="#082F63" stroke-width="16" stroke-linecap="round"/>

  <!-- Tracking/progress path -->
  <path
    d="M169 381
       L239 315
       L310 260
       L387 183"
    stroke="#74ACDF"
    stroke-width="20"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Upward arrow head -->
  <path
    d="M340 183 H387 V230"
    stroke="#74ACDF"
    stroke-width="20"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Nodes -->
  <circle cx="169" cy="381" r="28" fill="#FFFFFF" stroke="#74ACDF" stroke-width="18"/>
  <circle cx="239" cy="315" r="25" fill="#FFFFFF" stroke="#74ACDF" stroke-width="18"/>
  <circle cx="310" cy="260" r="25" fill="#FFFFFF" stroke="#74ACDF" stroke-width="18"/>
</svg>
